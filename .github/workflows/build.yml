name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e . && pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: ganttwarrior-linux-x86_64
          - os: macos-13
            artifact: ganttwarrior-macos-x86_64
          - os: macos-14
            artifact: ganttwarrior-macos-arm64
          - os: windows-latest
            artifact: ganttwarrior-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --name ganttwarrior \
            --onefile \
            --console \
            --collect-all textual \
            --collect-all rich \
            --hidden-import ganttwarrior.views \
            --hidden-import ganttwarrior.views.gantt \
            --hidden-import ganttwarrior.views.kanban \
            ganttwarrior/__main__.py
        shell: bash

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/ganttwarrior dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/ganttwarrior.exe dist/${{ matrix.artifact }}.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ganttwarrior-linux-x86_64/*
            artifacts/ganttwarrior-macos-x86_64/*
            artifacts/ganttwarrior-macos-arm64/*
            artifacts/ganttwarrior-windows-x86_64/*
